<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #050810;
        --surface: #0f1420;
        --surface-light: #1a202e;
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.4);
        --compex: #8b5cf6;
        --compex-glow: rgba(139, 92, 246, 0.4);
        --text: #ffffff;
        --text-dim: #94a3b8;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --card-border: rgba(255, 255, 255, 0.05);
        --glass: rgba(15, 20, 32, 0.7);
      }

      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg); color: var(--text); margin: 0; padding: 20px;
        padding-bottom: 110px; background-attachment: fixed;
        background-image: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      }

      .text-gradient {
        background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }

      #rest-timer-box {
        position: fixed; top: 0; left: 0; right: 0; height: 4px;
        background: var(--accent); width: 0%; z-index: 4000; transition: width 1s linear;
        box-shadow: 0 0 10px var(--accent); display: none;
      }

      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
      .weight-badge { background: var(--surface-light); padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; color: var(--accent); border: 1px solid var(--card-border); }

      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
      .stat-card { background: var(--surface); padding: 15px; border-radius: 20px; border: 1px solid var(--card-border); }
      .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
      .stat-value { font-size: 18px; font-weight: 800; color: var(--text); }

      .progress-container { background: var(--surface-light); height: 6px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
      .progress-bar { background: linear-gradient(90deg, var(--accent), var(--compex)); height: 100%; transition: width 0.6s ease; }

      .item-row {
        background: var(--surface); border-radius: 20px; padding: 16px; margin-bottom: 12px;
        border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between;
      }
      .item-row.done { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
      .item-name { font-weight: 700; font-size: 16px; }
      .item-target { font-size: 12px; color: var(--text-dim); }
      .item-last-val { font-weight: 800; color: var(--accent); font-size: 16px; }

      .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 2000;
        align-items: flex-end; justify-content: center;
      }
      .modal-inner {
        background: var(--surface); width: 100%; max-width: 500px; padding: 25px;
        border-radius: 32px 32px 0 0; animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

      .history-chip {
        display: inline-block; background: var(--surface-light); padding: 6px 12px;
        border-radius: 10px; font-size: 11px; margin-right: 5px; margin-top: 5px; border: 1px solid var(--card-border);
      }

      .plate-calc-box {
        background: #1a202e; border-radius: 15px; padding: 12px; margin: 15px 0;
        font-size: 12px; border: 1px dashed var(--accent); display: flex; flex-wrap: wrap; gap: 5px;
      }
      .plate-token { background: var(--accent); color: white; padding: 2px 8px; border-radius: 5px; font-weight: 800; }

      .warmup-box { background: rgba(139, 92, 246, 0.1); border-radius: 15px; padding: 12px; margin: 15px 0; }

      input {
        width: 100%; background: var(--surface-light); border: 1px solid var(--card-border);
        color: white; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: 700; margin-top: 5px;
      }

      .btn-primary {
        background: var(--accent); color: white; border: none; padding: 18px;
        border-radius: 18px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 15px;
      }

      .tab-bar {
        position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--glass);
        backdrop-filter: blur(20px); border-radius: 24px; display: flex; padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
      }
      .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-dim); padding: 10px; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 2px; }
      .tab-btn.active { color: var(--text); background: var(--surface-light); border-radius: 18px; }

      .toast {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: var(--accent); color: white; padding: 12px 25px; border-radius: 50px;
        font-weight: 800; display: none; z-index: 5000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    <div id="rest-timer-box"></div>
    <div id="toast" class="toast"></div>

    <div class="header">
      <div>
        <p style="margin: 0; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase;">GO TIME</p>
        <h1 id="giorno" class="text-gradient" style="margin: 0; font-size: 26px;">...</h1>
      </div>
      <div id="weight" class="weight-badge" onclick="openPesoModal()">-- kg</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Progress</div>
        <div id="progress-text" class="stat-value">0%</div>
        <div class="progress-container"><div id="progress-bar" class="progress-bar" style="width: 0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Volume Oggi</div>
        <div id="live-volume" class="stat-value">0 <span style="font-size:10px">KG</span></div>
      </div>
    </div>

    <div id="view-palestra"><div id="list-palestra"></div></div>
    <div id="view-compex" style="display: none"><div id="list-compex"></div></div>

    <div id="modal-input" class="modal" onclick="if(event.target==this) closeModal('modal-input')">
      <div class="modal-inner">
        <h2 id="modal-title" style="margin: 0; font-size: 22px; font-weight: 800;">Esercizio</h2>
        <div id="modal-history" style="margin-top: 10px;"></div>
        
        <div class="warmup-box" id="warmup-box">
          <div class="stat-label" style="color: var(--compex); margin-bottom: 5px;">Riscaldamento Suggerito</div>
          <div id="warmup-content" style="font-size: 11px; font-weight: 600;"></div>
        </div>

        <div style="margin-top: 15px;">
          <label class="stat-label">Carico (Kg)</label>
          <input type="text" id="valore" inputmode="decimal" oninput="updatePlateCalc(this.value)">
          <div id="plate-calc" class="plate-calc-box"></div>
        </div>

        <div style="margin-top: 15px;">
          <label class="stat-label">Sforzo (RPE 1-10)</label>
          <input type="number" id="rpe" min="1" max="10">
        </div>

        <button id="btn-save" class="btn-primary" onclick="save()">REGISTRA SET & RIPOSO</button>
        <button id="btn-delete" class="btn-delete" style="display: none" onclick="deleteSet()">ELIMINA</button>
      </div>
    </div>

    <div id="modal-peso" class="modal" onclick="if(event.target==this) closeModal('modal-peso')">
      <div class="modal-inner">
        <h2 style="margin: 0; font-size: 20px; font-weight: 800;">Peso Corporeo</h2>
        <input type="number" step="0.1" id="valore-peso" placeholder="Kg">
        <button class="btn-primary" onclick="savePeso()">AGGIORNA</button>
      </div>
    </div>

    <div class="tab-bar">
      <button id="tab-pal" class="tab-btn active" onclick="switchView('palestra')"><span>🏋️</span>GYM</button>
      <button id="tab-com" class="tab-btn" onclick="switchView('compex')"><span>⚡</span>COMPEX</button>
      <button class="tab-btn" onclick="openPesoModal()"><span>⚖️</span>BODY</button>
      <button class="tab-btn" onclick="google.script.run.archiviaSessione(); showToast('Archiviazione...')"><span>📦</span>SAVE</button>
    </div>

    <script>
      let state = { giorno: '...', ultimoPeso: 0, progress: 0, liveVolume: 0, palestra: [], compex: [], settings: {} };
      let activeEx = null, isCompexView = false, restTimer = null;

      function init() {
        google.script.run
          .withSuccessHandler((d) => { 
            if (d && !d.error) {
              state = d; 
              render(); 
            } else {
              showToast('❌ Errore: ' + (d ? d.error : 'Dati vuoti'));
            }
          })
          .withFailureHandler((err) => showToast('❌ Errore critico: ' + err.message))
          .getInitialData();
      }

      function render() {
        document.getElementById('giorno').innerText = state.giorno || '---';
        document.getElementById('weight').innerText = (state.uPeso || 0) + ' kg';
        document.getElementById('progress-bar').style.width = (state.prog || 0) + '%';
        document.getElementById('progress-text').innerText = (state.prog || 0).toFixed(0) + '%';
        document.getElementById('live-volume').innerHTML = (state.lVol || 0) + ' <span style="font-size:10px">KG</span>';
        
        renderList('list-palestra', state.palestra || [], false);
        renderList('list-compex', state.compex || [], true);
      }

      function renderList(id, list, compex) {
        const cont = document.getElementById(id);
        cont.innerHTML = list.length ? '' : '<div style="padding:40px; text-align:center; opacity:0.5;">Rest Day 🧘</div>';
        list.forEach((e) => {
          const div = document.createElement('div');
          div.className = `item-row ${e.comp ? 'done' : ''}`;
          div.onclick = () => openInput(e.id, compex);
          div.innerHTML = `
            <div style="flex:1">
              <div class="item-name">${e.nome}</div>
              <div class="item-target">${e.target}</div>
            </div>
            <div class="item-last-val">${e.last || '--'} <span style="font-size:10px">${compex ? 'LVL' : 'kg'}</span></div>
          `;
          cont.appendChild(div);
        });
      }

      function openInput(id, compex) {
        activeEx = (compex ? state.compex : state.palestra).find(x => x.id === id);
        isCompexView = compex;
        document.getElementById('modal-title').innerText = activeEx.nome;
        document.getElementById('valore').value = activeEx.comp ? activeEx.last : '';
        document.getElementById('btn-delete').style.display = activeEx.comp ? 'block' : 'none';
        
        const histCont = document.getElementById('modal-history');
        histCont.innerHTML = '<div class="stat-label">Storico Recente</div>';
        (activeEx.stor || []).forEach(h => {
          histCont.innerHTML += `<div class="history-chip">${h.data}: ${h.peso}kg (${h.setReps})</div>`;
        });

        const wuBox = document.getElementById('warmup-box');
        if (!compex && activeEx.last > 20) {
          wuBox.style.display = 'block';
          const v = parseFloat(activeEx.last);
          document.getElementById('warmup-content').innerHTML = 
            `1. ${Math.round(v*0.5)}kg x 10 | 2. ${Math.round(v*0.7)}kg x 5 | 3. ${Math.round(v*0.9)}kg x 2`;
        } else { wuBox.style.display = 'none'; }

        updatePlateCalc(activeEx.last);
        document.getElementById('modal-input').style.display = 'flex';
      }

      function updatePlateCalc(val) {
        const cont = document.getElementById('plate-calc');
        const weight = parseFloat(val);
        const barbell = parseFloat(state.settings ? state.settings.BARBELL_WEIGHT : 20) || 20;
        if (isNaN(weight) || weight <= barbell || isCompexView) { cont.style.display = 'none'; return; }
        cont.style.display = 'flex';
        cont.innerHTML = '<div style="width:100%; margin-bottom:5px; font-weight:800">LATO:</div>';
        let remaining = (weight - barbell) / 2;
        [25, 20, 15, 10, 5, 2.5, 1.25].forEach(p => {
          while (remaining >= p) {
            cont.innerHTML += `<span class="plate-token">${p}</span>`;
            remaining -= p;
          }
        });
      }

      function startRestTimer() {
        const configSeconds = isCompexView ? 
          (parseInt(state.settings.REST_TIME_COMPEX) || 30) : 
          (parseInt(state.settings.REST_TIME_GYM) || 90);
        const box = document.getElementById('rest-timer-box');
        box.style.display = 'block';
        box.style.width = '100%';
        let current = configSeconds;
        if (restTimer) clearInterval(restTimer);
        restTimer = setInterval(() => {
          current--;
          box.style.width = (current / configSeconds * 100) + '%';
          if (current <= 0) {
            clearInterval(restTimer); box.style.display = 'none';
            showToast('⏰ RIPOSO FINITO!');
          }
        }, 1000);
      }

      function save() {
        const val = document.getElementById('valore').value;
        const rpe = document.getElementById('rpe').value;
        if (!val) return;
        google.script.run.withSuccessHandler((d) => {
          if (d && !d.error) { state = d; render(); closeModal('modal-input'); showToast('✅ Registrato!'); startRestTimer(); }
        }).logSetAdvanced({id: activeEx.id, valore: val, rpe: rpe});
      }

      function deleteSet() {
        google.script.run.withSuccessHandler((d) => { state = d; render(); closeModal('modal-input'); }).deleteSetAdvanced(activeEx.id);
      }

      function savePeso() {
        const p = document.getElementById('valore-peso').value;
        google.script.run.withSuccessHandler((d) => { state = d; render(); closeModal('modal-peso'); }).saveBodyWeight(p);
      }

      function closeModal(id) { document.getElementById(id).style.display = 'none'; }
      function openPesoModal() { document.getElementById('modal-peso').style.display = 'flex'; }
      function switchView(v) {
        isCompexView = v === 'compex';
        document.getElementById('view-palestra').style.display = isCompexView ? 'none' : 'block';
        document.getElementById('view-compex').style.display = isCompexView ? 'block' : 'none';
        document.getElementById('tab-pal').classList.toggle('active', !isCompexView);
        document.getElementById('tab-com').classList.toggle('active', isCompexView);
      }
      function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }

      window.onload = init;
    </script>
  </body>
</html>
