<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --accent: #00ff88; --text: #ffffff; --text-dim: #a0a0a0; --danger: #ff4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 16px; padding-bottom: 80px; }
        .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
        .loader { width: 40px; height: 40px; border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* TOAST NOTIFICATIONS */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 2000; text-align: center; min-width: 250px; pointer-events: none; }
        .toast-success { background: var(--accent); color: #000; }
        .toast-error { background: var(--danger); color: #fff; }

        .header { margin-bottom: 24px; }
        .title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .subtitle { color: var(--text-dim); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid #222; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        .ex-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #222; position: relative; }
        .ex-card.done { border-color: var(--accent); opacity: 0.7; }
        .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .ex-name { font-size: 18px; font-weight: 700; margin: 0; max-width: 70%; }
        .ex-group { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; }
        .ex-target { font-size: 14px; color: var(--text-dim); }

        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid #333; color: var(--text); }
        .btn-danger { color: var(--danger); background: rgba(255, 68, 68, 0.1); }
        
        .timer-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,255,136,0.1); color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 24px; padding: 24px; max-width: 400px; margin: 40px auto; border: 1px solid #333; }
        .input-group { margin-bottom: 16px; }
        input { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 16px; }
        
        .help-section { margin-top: 40px; border-top: 1px solid #222; padding-top: 20px; }
        .help-item { margin-bottom: 12px; }
        .help-t { font-weight: 700; color: var(--accent); font-size: 14px; }
        .help-d { font-size: 13px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="loading-screen" id="loader"><div class="loader"></div><p style="margin-top:16px; font-weight:600">Sincronizzazione...</p></div>

    <div class="header">
        <p class="subtitle" id="data-label">Oggi</p>
        <h1 class="title" id="giorno-label">AI COACH</h1>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <div class="stat-val" id="vol-val">0</div>
            <div class="stat-label">Volume (kg)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="peso-val">0</div>
            <div class="stat-label">Peso Corporeo</div>
        </div>
    </div>

    <div id="esercizi-container"></div>

    <div class="help-section">
        <h3 style="font-size: 14px; text-transform: uppercase; color: var(--text-dim)">Documentazione Tecnica</h3>
        <div id="help-container"></div>
        <p style="font-size: 10px; color: #444; margin-top: 20px">v<span id="version-tag"></span> | Powered by CacheService V8</p>
    </div>

    <!-- MODAL LOG -->
    <div id="logModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0">Log Esercizio</h2>
            <div class="input-group">
                <label class="stat-label">Peso Effettivo (kg)</label>
                <input type="number" id="inputPeso" placeholder="Es. 80">
            </div>
            <div class="input-group">
                <label class="stat-label">RPE (Sforzo 1-10)</label>
                <input type="number" id="inputRPE" placeholder="Es. 8">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
                <button class="btn btn-primary" onclick="saveLog()">Salva</button>
            </div>
        </div>
    </div>

    <script>
        let currentExId = null;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = type === 'success' ? 'toast-success' : 'toast-error';
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function init() {
            google.script.run
                .withSuccessHandler(renderData)
                .withFailureHandler(err => {
                    showToast("Errore di rete: " + err, 'error');
                    document.getElementById('loader').style.display = 'none';
                })
                .getInitialData();
            
            google.script.run.withSuccessHandler(renderHelp).getHelpData();
        }

        function renderData(data) {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

            document.getElementById('giorno-label').innerText = data.giorno;
            document.getElementById('vol-val').innerText = data.lVol;
            document.getElementById('peso-val').innerText = data.uPeso + " kg";

            const container = document.getElementById('esercizi-container');
            container.innerHTML = '';

            data.palestra.forEach(ex => {
                const card = document.createElement('div');
                card.className = `ex-card ${ex.comp ? 'done' : ''}`;
                card.innerHTML = `
                    <div class="ex-header">
                        <div>
                            <div class="ex-group">${ex.gruppo}</div>
                            <h3 class="ex-name">${ex.nome}</h3>
                            <div class="ex-target">Target: ${ex.target} | Last: ${ex.last}kg</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        ${ex.comp ? 
                            `<button class="btn btn-danger" onclick="deleteSet(${ex.id})">Rimuovi</button>` : 
                            `<button class="btn btn-primary" onclick="openModal(${ex.id}, '${ex.nome}')">Log Set</button>`
                        }
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderHelp(data) {
            document.getElementById('version-tag').innerText = data.version;
            const container = document.getElementById('help-container');
            data.docs.forEach(item => {
                container.innerHTML += `<div class="help-item"><div class="help-t">${item.t}</div><div class="help-d">${item.d}</div></div>`;
            });
        }

        function openModal(id, nome) {
            currentExId = id;
            document.getElementById('modalTitle').innerText = nome;
            document.getElementById('logModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('logModal').style.display = 'none';
        }

        function saveLog() {
            const p = document.getElementById('inputPeso').value;
            const r = document.getElementById('inputRPE').value;
            if(!p) { showToast("Inserisci il peso!", "error"); return; }
            
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').style.opacity = '1';
            
            google.script.run
                .withSuccessHandler(data => {
                    renderData(data);
                    closeModal();
                    showToast("Allenamento salvato!");
                })
                .withFailureHandler(err => {
                    showToast("Errore salvataggio!", "error");
                    document.getElementById('loader').style.display = 'none';
                })
                .logSetAdvanced({ id: currentExId, valore: p, rpe: r });
        }

        function deleteSet(id) {
            if(!confirm("Sicuro di voler rimuovere l'ultimo set?")) return;
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').style.opacity = '1';
            google.script.run
                .withSuccessHandler(data => {
                    renderData(data);
                    showToast("Set rimosso");
                })
                .logSetAdvanced({ id: id, valore: 0, rpe: 0, delete: true }); // Simplificato per demo
        }

        window.onload = init;
    </script>
</body>
</html>
